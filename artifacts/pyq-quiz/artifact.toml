kind = "web"
previewPath = "/"
title = "PYQ Practice App"
version = "1.0.0"
id = "artifacts/pyq-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20678

[services.development]
run = "pnpm --filter @workspace/pyq-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pyq-quiz", "run", "build" ]
publicDir = "artifacts/pyq-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20678"
BASE_PATH = "/"
